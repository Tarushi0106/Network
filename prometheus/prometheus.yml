# Prometheus Configuration for Network Monitoring
# =============================================
# 
# This configuration scrapes metrics from the SNMP Exporter
# which collects data from MikroTik routers.
#
# Copy this to your Prometheus config directory and adjust as needed.

global:
  scrape_interval: 60s
  evaluation_interval: 60s
  external_labels:
    cluster: 'network-monitor'
    environment: 'production'

# Alerting rules
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files: []

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # SNMP Exporter for MikroTik routers
  - job_name: 'snmp'
    scrape_interval: 60s
    static_configs:
      - targets:
          # Add your MikroTik router IPs here
          # The SNMP Exporter should be running on localhost:9116
          - 'localhost:9116'
        labels:
          type: 'mikrotik'
          network: 'production'
    
    # SNMP configuration module
    params:
      module: [ifmib]  # Use ifmib module for interface metrics
    
    metrics_path: /snmp
    
    # Relabel rules to extract useful labels
    relabel_configs:
      # Use instance IP as the router identifier
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):\\d+'
        replacement: '${1}'
      
      # Map instance to router for human-readable names
      - source_labels: [instance]
        target_label: router
        replacement: 'router_${1}'
      
      # Keep only relevant metrics
      - source_labels: [__name__]
        regex: 'ifHCInOctets|ifHCOutOctets|ifHCInUcastPkts|ifHCOutUcastPkts|ifInErrors|ifOutErrors'
        action: keep

