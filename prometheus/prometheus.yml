global:
scrape_interval: 15s

scrape_configs:

* job_name: "prometheus"
  static_configs:

  * targets: ["localhost:9090"]

* job_name: "mikrotik-snmp"
  metrics_path: /snmp
  params:
  module: [if_mib]

  static_configs:

  * targets:

    * 103.200.105.88

  relabel_configs:

  * source_labels: [**address**]
    target_label: __param_target

  * source_labels: [__param_target]
    target_label: instance

  * target_label: **address**
    replacement: localhost:9116
