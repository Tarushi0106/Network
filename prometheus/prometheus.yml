# Prometheus Configuration for Network Monitoring

global:
scrape_interval: 60s
evaluation_interval: 60s

alerting:
alertmanagers:
- static_configs:
- targets: []

rule_files: []

scrape_configs:

# Prometheus self monitoring

* job_name: "prometheus"
  static_configs:

  * targets: ["localhost:9090"]

# MikroTik SNMP Monitoring

* job_name: "mikrotik-snmp"
  metrics_path: /snmp
  params:
  module: [if_mib]

  static_configs:

  * targets:

    * 103.200.105.88
      labels:
      router: mikrotik-main

  relabel_configs:

  * source_labels: [**address**]
    target_label: __param_target

  * source_labels: [__param_target]
    target_label: instance

  * target_label: **address**
    replacement: localhost:9116
