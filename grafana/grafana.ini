# ======================================================
# Grafana Configuration for NOC Dashboard Embedding
# ======================================================
#
# This configuration enables embedding Grafana panels in iframes
# for the NOC dashboard application.
#
# IMPORTANT: Copy this to your Grafana config directory:
#   - Linux: /etc/grafana/grafana.ini
#   - Windows: C:\Program Files\GrafanaLabs\grafana\conf\default.ini
#   - Docker: Add as environment variable
#
# After editing, restart Grafana for changes to take effect.

#################################### Security ####################################
[security]

# REQUIRED: Enable iframe embedding
allow_embedding = true

# Anonymous access (set to false for production)
;allow_anonymous = false

#################################### Users ####################################
[users]

# Disable user signup
allow_sign_up = false

#################################### Auth ####################################
[auth]

# Disable anonymous viewing
;anonymous_enabled = false

#################################### Server ####################################
[server]

# Protocol (http, https, socket)
;protocol = http

# The http port
;http_port = 3000

#################################### Dashboards ####################################
[dashboards]

# Default dashboard
;default_home_dashboard_path = /var/lib/grafana/dashboards/home.json

# ======================================================
# DOCKER ALTERNATIVE
# ======================================================
# If using Docker, run with environment variables:
#
# docker run -d \
#   -p 3000:3000 \
#   -e "GF_SECURITY_ALLOW_EMBEDDING=true" \
#   -e "GF_USERS_ALLOW_SIGN_UP=false" \
#   -e "GF_AUTH_ANONYMOUS_ENABLED=false" \
#   grafana/grafana
